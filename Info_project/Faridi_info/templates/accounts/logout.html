<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout Page</title>
</head>
<body>
    <h1>Logout</h1>
    <p>Are you sure you want to logout?</p>
    <form method='POST'>
        {% csrf_token %}
        <button type='submit'>Logout</button>
        <a href="{% url 'my_view' %}">Cancel</a>
    </form>
</body>
</html>
