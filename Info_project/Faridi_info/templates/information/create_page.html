{% extends "information/layout.html" %}
{% block content %}

<div class="mx-auto p-6 md:p-8 max-w-xl border-0 border-blue-900 rounded-xl shadow-2xl mt-6 bg-white">
    <div>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Title -->
            <div class="my-6 text-center">
                <h1 class="text-2xl md:text-3xl font-semibold text-purple-800">Profile Details Form</h1>
            </div>

            <!-- Form Fields -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                {% for field in form %}
                <div>
                    <label class="block text-base md:text-lg font-semibold text-gray-700 mb-2">{{field.label}}</label>
                    <div class="w-full">
                        {{field}}
                    </div>
                </div>
                {% endfor %}
            </div>

            <!-- Submit Button -->
            <div class="my-6">
                <button type="submit"
                    class="w-full py-2 md:py-3 text-base md:text-lg text-white font-semibold bg-blue-600 rounded-lg hover:bg-blue-700 transition duration-300 shadow-md">
                    Submit
                </button>
            </div>

        </form>
    </div>
</div>

{% endblock %}
